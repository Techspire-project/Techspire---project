{% extends "form_base.html" %}
{% set page_title = "Paper Presentation Preparation" %}
{% set form_title = "📝 PAPER PRESENTATION ORDER" %}
{% block form_fields %}
<div class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Your Name *</label>
    <input type="text" name="name" class="form-control" required placeholder="Your full name"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">Department *</label>
    <input type="text" name="department" class="form-control" required placeholder="e.g. CSE, ECE, Mechanical"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">WhatsApp Number *</label>
    <input type="tel" name="whatsapp" class="form-control" required placeholder="10-digit number" pattern="[0-9]{10}"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">Number of Pages *</label>
    <input type="number" name="num_pages" class="form-control" required min="1" placeholder="e.g. 6"/>
  </div>
  <div class="col-12">
    <label class="form-label">Topic *</label>
    <input type="text" name="topic" class="form-control" required placeholder="Paper presentation topic"/>
  </div>
</div>
{% endblock %}
