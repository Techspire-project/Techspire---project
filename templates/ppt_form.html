{% extends "form_base.html" %}
{% set page_title = "PPT Creation" %}
{% set form_title = "📊 PPT ORDER FORM" %}
{% block form_fields %}
<div class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Your Name *</label>
    <input type="text" name="name" class="form-control" required placeholder="Your full name"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">Department *</label>
    <input type="text" name="department" class="form-control" required placeholder="e.g. CSE, MBA, Science"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">WhatsApp Number *</label>
    <input type="tel" name="whatsapp" class="form-control" required placeholder="10-digit number" pattern="[0-9]{10}"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">Total Slides Required *</label>
    <input type="number" name="total_slides" class="form-control" required min="1" placeholder="e.g. 20"/>
  </div>
  <div class="col-12">
    <label class="form-label">Purpose *</label>
    <input type="text" name="purpose" class="form-control" required placeholder="e.g. Seminar, Project review, Business pitch"/>
  </div>
  <div class="col-12">
    <label class="form-label">Topic / Idea (Optional)</label>
    <input type="text" name="topic" class="form-control" placeholder="If you have a topic ready"/>
  </div>
</div>
{% endblock %}
