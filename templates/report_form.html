{% extends "form_base.html" %}
{% set page_title = "Report & Documentation Writing" %}
{% set form_title = "📄 REPORT / DOCUMENTATION ORDER" %}
{% block form_fields %}
<div class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Your Name *</label>
    <input type="text" name="name" class="form-control" required placeholder="Your full name"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">Department *</label>
    <input type="text" name="department" class="form-control" required placeholder="e.g. CSE, IT"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">WhatsApp Number *</label>
    <input type="tel" name="whatsapp" class="form-control" required placeholder="10-digit number" pattern="[0-9]{10}"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">Number of Pages *</label>
    <input type="number" name="num_pages" class="form-control" required min="1" placeholder="e.g. 60"/>
  </div>
  <div class="col-12">
    <label class="form-label">Report Headings / Chapters *</label>
    <textarea name="report_headings" class="form-control" rows="5" required placeholder="List all chapter/section headings required...&#10;e.g.&#10;1. Abstract&#10;2. Introduction&#10;3. Literature Review..."></textarea>
  </div>
</div>
{% endblock %}
