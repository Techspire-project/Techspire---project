{% extends "form_base.html" %}
{% set page_title = "Invitation / Poster / GIF Design" %}
{% set form_title = "💌 INVITATION / POSTER / GIF ORDER" %}
{% block form_fields %}
<div class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Your Name *</label>
    <input type="text" name="name" class="form-control" required placeholder="Your full name"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">WhatsApp Number *</label>
    <input type="tel" name="whatsapp" class="form-control" required placeholder="10-digit number" pattern="[0-9]{10}"/>
  </div>
  <div class="col-12">
    <label class="form-label">Purpose *</label>
    <input type="text" name="purpose" class="form-control" required placeholder="e.g. Wedding invitation, Event poster, Birthday GIF"/>
  </div>
  <div class="col-12">
    <label class="form-label">Content Details *</label>
    <textarea name="content_details" class="form-control" rows="4" required placeholder="All text, images, details to include..."></textarea>
  </div>
  <div class="col-md-6">
    <label class="form-label">Font Style *</label>
    <input type="text" name="font_style" class="form-control" required placeholder="e.g. Elegant, Bold, Cursive"/>
  </div>
  <div class="col-md-6">
    <label class="form-label">Font Size *</label>
    <input type="text" name="font_size" class="form-control" required placeholder="e.g. Large heading, Small body"/>
  </div>
</div>
{% endblock %}
